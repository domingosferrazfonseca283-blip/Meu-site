<section style="background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px;">
    <h3 style="color: #2c3e50; margin-top: 0; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
        📦 Novo Produto (Milomércios)
    </h3>
    
    <form id="formProduto" style="display: grid; gap: 15px; margin-top: 20px;">
        <div>
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Nome do Produto:</label>
            <input type="text" placeholder="Ex: Smartphone Milomércios X1" required 
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label style="display:block; font-weight:bold; margin-bottom:5px;">Preço (R$):</label>
                <input type="number" step="0.01" placeholder="0,00" required 
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
            <div style="flex: 1;">
                <label style="display:block; font-weight:bold; margin-bottom:5px;">Qtd. Estoque:</label>
                <input type="number" placeholder="Ex: 50" required 
                    style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;">
            </div>
        </div>

        <div>
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Categoria:</label>
            <select style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white;">
                <option>Eletrónicos</option>
                <option>Vestuário</option>
                <option>Casa & Decoração</option>
                <option>Acessórios</option>
            </select>
        </div>

        <div>
            <label style="display:block; font-weight:bold; margin-bottom:5px;">Descrição do Produto:</label>
            <textarea rows="4" placeholder="Descreva os detalhes técnicos e benefícios..." 
                style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box;"></textarea>
        </div>

        <div style="border: 2px dashed #3498db; padding: 20px; text-align: center; border-radius: 8px; background: #f0f7ff;">
            <label style="cursor: pointer; color: #3498db; font-weight: bold;">
                📸 Clique aqui para enviar a foto do produto
                <input type="file" accept="image/*" style="display: none;">
            </label>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button type="submit" 
                style="flex: 2; background: #27ae60; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                SALVAR PRODUTO
            </button>
            <button type="reset" 
                style="flex: 1; background: #e74c3c; color: white; border: none; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                LIMPAR
            </button>
        </div>
    </form>
</section>

<script>
    // Pequena lógica para avisar que o produto foi "salvo" (simulação)
    document.getElementById('formProduto').onsubmit = function(e) {
        e.preventDefault();
        alert("Sucesso! O produto foi registado no sistema Milomércios.");
    }
</script>
