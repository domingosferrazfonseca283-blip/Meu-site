<div id="login-container" style="max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <h2 style="text-align: center; color: #2c3e50;">Acessar Milomércios</h2>
    <form id="loginForm" style="display: flex; flex-direction: column; gap: 15px;">
        <input type="email" id="email" placeholder="Seu E-mail" required style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <input type="password" id="pass" placeholder="Sua Senha" required style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">
        <button type="submit" style="background: #3498db; color: white; padding: 15px; border: none; border-radius: 8px; font-weight: bold;">ENTRAR</button>
    </form>
</div>
